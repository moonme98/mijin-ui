<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>

    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/signup.css">
</head>

<body>

<div id="header"></div>

<div class="signup-container">

    <div class="signup-card">
        <h2>SIGN UP</h2>

        <form id="signupForm">

            <label>USER ID</label>
            <input type="text" id="userId" placeholder="영문, 숫자 4~20자">

            <label>PASSWORD</label>
            <div class="pw-wrap">
                <input type="password" id="password" placeholder="8~20자">
                <i class="fas fa-eye-slash toggle" data-target="password"></i>
            </div>

            <label>CONFIRM PASSWORD</label>
            <div class="pw-wrap">
                <input type="password" id="confirmPassword">
                <i class="fas fa-eye-slash toggle" data-target="confirmPassword"></i>
            </div>

            <label>NICKNAME</label>
            <input type="text" id="nickname" placeholder="10자 이내">

            <label>E-MAIL</label>
            <input type="email" id="email" placeholder="example@trippy.com">

            <div class="terms">
                <label class="terms-row">
                    <input type="checkbox" id="terms">

                    <span class="terms-text">
                        약관에 동의합니다
                        <a href="#">서비스 이용약관</a>
                        및
                        <a href="#">개인정보 처리방침</a>
                    </span>
                </label>
            </div>

            <button id="submitBtn" disabled>SIGN UP</button>

            <p class="login-text">
                Already have an account? <a href="login.html">LOGIN</a>
            </p>

        </form>
    </div>

</div>

<div id="footer"></div>

<script src="./js/include.js"></script>
<script src="./js/main.js"></script>

<script>
fetch("./components/header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;

    initHeader();
});
</script>

</body>
</html>
