<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIPPY | 여행 코스 플랫폼</title>

    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/layout.css">
</head>

<body>

<div id="header"></div>

<main>

    <!-- HERO -->
    <section class="main-visual">
        <div class="slides">

            <div class="slide active">
                <img src="./images/hero1.jpg">
                <div class="overlay">
                    <h1>TRAVEL YOUR WAY</h1>
                    <p>당신만의 여행 코스를 발견하세요</p>
                    <a href="./trip.html" class="hero-btn">코스 탐색하기</a>
                </div>
            </div>

            <div class="slide">
                <img src="./images/hero2.jpg">
                <div class="overlay">
                    <h1>DISCOVER YOUR TRIP</h1>
                    <p>나에게 맞는 여행 코스 찾기</p>
                    <a href="./trip.html" class="hero-btn">코스 탐색하기</a>
                </div>
            </div>

            <div class="slide">
                <img src="./images/hero3.png">
                <div class="overlay">
                    <h1>SEOUL CITY VIBE</h1>
                    <p>서울 감성 여행 코스 추천</p>
                    <a href="./trip.html" class="hero-btn">코스 탐색하기</a>
                </div>
            </div>
            
        </div>
       
        <div class="slide-count">
            <span class="current">01</span>
            <span>/</span>
            <span class="total">03</span>
        </div>

    </section>


    <!-- 인기코스 -->
    <div class="container">
        <section class="section">
            <h2>POPULAR COURSES</h2>

            <div class="course-list">

                <div class="course">
                    <div class="img-box">
                        <img src="./images/trip12.jpg">
                    </div>
                    <div class="info">
                        <p class="title">서울 감성 카페 투어</p>
                        <p class="location">서울</p>
                    </div>
                </div>

                <div class="course">
                    <div class="img-box">
                        <img src="./images/trip11.jpg">
                    </div>
                    <div class="info">
                        <p class="title">부산 바다 드라이브</p>
                        <p class="location">부산</p>
                    </div>
                </div>

                <div class="course">
                    <div class="img-box">
                        <img src="./images/trip13.jpg">
                    </div>
                    <div class="info">
                        <p class="title">제주 힐링 여행</p>
                        <p class="location">제주</p>
                    </div>
                </div>

            </div>
        </section>
    </div>


    <!-- 배너 -->
    <section class="banner full">
        <img src="./images/banner.jpg">
    </section>


    <!-- 트래블 스타일 -->
    <section class="travel-style">

        <div class="container">
            <h2>TRAVEL STYLE</h2>
        </div>

        <div class="style-wrap">
            <div class="style-slider">

                <div class="style-card">
                    <img src="./images/trip16.jpg">
                    <div class="text">
                        <p class="top">RELAX</p>
                        <p class="bottom">힐링 여행</p>
                    </div>
                </div>

                <div class="style-card">
                    <img src="./images/trip14.jpg">
                    <div class="text">
                        <p class="top">NATURE</p>
                        <p class="bottom">자연</p>
                    </div>
                </div>

                <div class="style-card">
                    <img src="./images/trip15.jpg">
                    <div class="text">
                        <p class="top">ACTIVITY</p>
                        <p class="bottom">액티비티</p>
                    </div>
                </div>

                <div class="style-card">
                    <img src="./images/trip17.jpg">
                    <div class="text">
                        <p class="top">MOOD</p>
                        <p class="bottom">감성 여행</p>
                    </div>
                </div>
                
            </div>
        </div>

    </section>

</main>

<div id="footer"></div>

<script src="./js/main.js"></script>
<script src="./js/include.js"></script>

</body>
</html>
